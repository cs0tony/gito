name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  create-release:
    name: Create Release
    runs-on: ubuntu-latest
    outputs:
      upload_url: ${{ steps.create_release.outputs.upload_url }}
      release_id: ${{ steps.create_release.outputs.id }}
    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Create Release
      id: create_release
      uses: softprops/action-gh-release@v2
      with:
        draft: true
        prerelease: false
        generate_release_notes: true
        files: |
          README.md
          LICENSE

  build-and-upload:
    name: Build and Upload Binaries
    needs: create-release
    strategy:
      matrix:
        include:
          - target: bun-linux-x64
            os: ubuntu-latest
            binary_name: gito
            asset_name_suffix: "linux-x64.tar.gz"
          - target: bun-linux-aarch64
            os: ubuntu-latest
            binary_name: gito
            asset_name_suffix: "linux-arm64.tar.gz"
          - target: bun-darwin-x64
            os: macos-latest
            binary_name: gito
            asset_name_suffix: "macos-x64.tar.gz"
          - target: bun-darwin-aarch64
            os: macos-latest
            binary_name: gito
            asset_name_suffix: "macos-arm64.tar.gz"
          - target: bun-windows-x64
            os: windows-latest
            binary_name: gito.exe
            asset_name_suffix: "windows-x64.zip"

    runs-on: ${{ matrix.os }}

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup Bun
      uses: oven-sh/setup-bun@v2
      with:
        bun-version: latest

    - name: Install dependencies
      run: bun install

    - name: Get version
      id: version
      shell: bash
      run: echo "version=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

    - name: Build binary
      shell: bash
      run: |
        bun build src/cli.ts --compile --minify --target=${{ matrix.target }} --outfile "${{ matrix.binary_name }}"

        # Verify the binary was created
        ls -la "${{ matrix.binary_name }}"

    - name: Prepare release assets
      shell: bash
      run: |
        # Create a directory for the release
        mkdir -p release

        # Copy binary to release directory
        cp "${{ matrix.binary_name }}" release/

        # Copy additional files
        cp README.md release/
        cp LICENSE release/ 2>/dev/null || echo "No LICENSE file found"

    - name: Package binary (Windows)
      if: contains(matrix.asset_name_suffix, 'windows')
      shell: bash
      run: |
        cd release
        asset_name="gito-${{ steps.version.outputs.version }}-${{ matrix.asset_name_suffix }}"
        7z a "../${asset_name}" *
        cd ..
        echo "ASSET_NAME=${asset_name}" >> $GITHUB_ENV

    - name: Package binary (Unix)
      if: "!contains(matrix.asset_name_suffix, 'windows')"
      shell: bash
      run: |
        cd release
        asset_name="gito-${{ steps.version.outputs.version }}-${{ matrix.asset_name_suffix }}"
        tar -czf "../${asset_name}" *
        cd ..
        echo "ASSET_NAME=${asset_name}" >> $GITHUB_ENV

    - name: Generate checksums
      shell: bash
      run: |
        if command -v sha256sum >/dev/null; then
          sha256sum "${{ env.ASSET_NAME }}" > "${{ env.ASSET_NAME }}.sha256"
        elif command -v shasum >/dev/null; then
          shasum -a 256 "${{ env.ASSET_NAME }}" > "${{ env.ASSET_NAME }}.sha256"
        else
          echo "No checksum utility found"
        fi

    - name: Upload Release Asset
      uses: softprops/action-gh-release@v2
      with:
        files: |
          ${{ env.ASSET_NAME }}
          ${{ env.ASSET_NAME }}.sha256
